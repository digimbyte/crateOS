apiVersion: crateos/v1
kind: Module
metadata:
  id: cloudflared
  name: Cloudflared
  category: ingress
  version: "1.0.0"
  description: Managed Cloudflare Tunnel client
spec:
  runtimeType: systemd
  installMode: staged
  packages:
    - cloudflared
  units:
    - cloudflared.service
  paths:
    config:
      canonical: /srv/crateos/services/cloudflared/config
      native: /etc/cloudflared
    data:
      canonical: /srv/crateos/services/cloudflared/data
      native: /var/lib/cloudflared
    logs:
      canonical: /srv/crateos/services/cloudflared/logs
      native: /var/log
  healthChecks:
    - type: command
      command: systemctl is-active cloudflared.service
