apiVersion: crateos/v1
kind: Module
metadata:
  id: docker
  name: Docker
  category: runtime
  version: "1.0.0"
  description: Managed container runtime with Compose support
spec:
  runtimeType: systemd
  installMode: immediate
  packages:
    - docker-ce
    - docker-ce-cli
    - containerd.io
    - docker-compose-plugin
  units:
    - docker.service
    - docker.socket
  paths:
    config:
      canonical: /srv/crateos/services/docker/config
      native: /etc/docker
    data:
      canonical: /srv/crateos/services/docker/data
      native: /var/lib/docker
    logs:
      canonical: /srv/crateos/services/docker/logs
      native: /var/log
  healthChecks:
    - type: command
      command: docker info > /dev/null 2>&1
