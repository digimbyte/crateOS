apiVersion: crateos/v1
kind: Module
metadata:
  id: postgres
  name: PostgreSQL
  category: database
  version: "16.0.0"
  description: Managed PostgreSQL database
spec:
  runtimeType: systemd
  installMode: staged
  packages:
    - postgresql
    - postgresql-contrib
  units:
    - postgresql.service
  paths:
    config:
      canonical: /srv/crateos/services/postgres/config
      native: /etc/postgresql
    data:
      canonical: /srv/crateos/services/postgres/data
      native: /var/lib/postgresql
    logs:
      canonical: /srv/crateos/services/postgres/logs
      native: /var/log/postgresql
  network:
    ports:
      - name: postgres
        port: 5432
        protocol: tcp
  healthChecks:
    - type: command
      command: pg_isready
