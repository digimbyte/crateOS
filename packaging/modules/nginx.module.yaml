apiVersion: crateos/v1
kind: Module
metadata:
  id: nginx
  name: Nginx
  category: proxy
  version: "1.0.0"
  description: Managed nginx reverse proxy
spec:
  runtimeType: systemd
  installMode: immediate
  packages:
    - nginx
  units:
    - nginx.service
  paths:
    config:
      canonical: /srv/crateos/services/nginx/config
      native: /etc/nginx
    logs:
      canonical: /srv/crateos/services/nginx/logs
      native: /var/log/nginx
  network:
    ports:
      - name: http
        port: 80
        protocol: tcp
      - name: https
        port: 443
        protocol: tcp
  healthChecks:
    - type: command
      command: nginx -t
