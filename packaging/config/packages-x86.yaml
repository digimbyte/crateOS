# CrateOS x86-64 package policy
# Platform: Ubuntu 24.04 LTS (Noble Numbat)
#
# x86 platform has:
# - Full CPU resources (quad-core or better)
# - 2GB+ RAM (typically 4GB+)
# - Full disk I/O capabilities
# - NVMe/SSD support
# - Full diagnostics tooling support

required:
  # --- Core platform ---
  - openssh-server
  - network-manager
  - nftables
  - openssl
  - ca-certificates

  # --- Base utilities ---
  - curl
  - wget
  - jq
  - yq
  - git
  - rsync
  - dos2unix
  - lsof

  # --- Time/updates/maintenance ---
  - chrony
  - unattended-upgrades
  - needrestart
  - logrotate

  # --- Diagnostics & hardware (full set for x86) ---
  - btop
  - ncdu
  - smartmontools
  - nvme-cli
  - lm-sensors
  - fancontrol
  - hddtemp
  - iperf3
  - ethtool
  - iw
  - dnsutils
  - mtr-tiny
  - pciutils
  - usbutils

  # --- Security & access ---
  - fail2ban
  - wireguard

  # --- Ops tooling ---
  - tmux
  - build-essential
  - pkg-config
  - python3
  - python3-venv
  - python3-pip
  - powershell

optional:
  # --- UI / local UX (opt-in, full support on x86) ---
  - lightdm
  - cockpit

  # --- Web hosting / reverse proxy (opt-in) ---
  - nginx

  # --- Containers (opt-in) ---
  - docker.io
  - docker-compose-plugin

  # --- Databases / data services (opt-in) ---
  - postgres

  # --- Email / alerts (opt-in) ---
  - msmtp

  # --- VPN / tunnels (opt-in) ---
  - wireguard
  - cloudflared

  # --- Terminal extras (opt-in) ---
  - screen

  # --- Virtualization (x86 only) ---
  - qemu-system-x86
  - libvirt-daemon
  - virt-manager

  # --- Media tools (x86 specific) ---
  - ffmpeg
  - imagemagick

excluded: []
