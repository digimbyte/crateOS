# CrateOS firewall policy (nftables)
# Agent generates nftables rules from this config.

enabled: true
backend: "nftables"

# Default policy for incoming traffic
default_input: "drop"
default_forward: "drop"
default_output: "accept"

# Allowed inbound rules
allow:
  - name: "SSH"
    port: 22
    protocol: "tcp"
    source: "any"

  - name: "HTTP"
    port: 80
    protocol: "tcp"
    source: "any"

  - name: "HTTPS"
    port: 443
    protocol: "tcp"
    source: "any"

  # Uncomment to allow Cockpit web admin
  # - name: "Cockpit"
  #   port: 9090
  #   protocol: "tcp"
  #   source: "lan"       # lan | vpn | any

  # Uncomment for WireGuard VPN
  # - name: "WireGuard"
  #   port: 51820
  #   protocol: "udp"
  #   source: "any"

# Rate limiting for SSH brute-force protection
rate_limit:
  ssh:
    enabled: true
    max_attempts: 5
    window: "60s"

# ICMP (ping) policy
icmp:
  allow_ping: true
