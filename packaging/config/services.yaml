# CrateOS service registry
# Declares which modules are enabled and their runtime options.

services:
  - name: "nginx"
    enabled: true
    runtime: "systemd"     # systemd | docker
    autostart: true

  - name: "docker"
    enabled: true
    runtime: "systemd"
    autostart: true

