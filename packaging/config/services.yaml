# CrateOS service registry
# Declares which modules are enabled and their runtime options.

services:
  - name: "nginx"
    enabled: true
    runtime: "systemd"     # systemd | docker
    autostart: true
    actor:
      name: "svc-nginx"
      type: "service"
    execution:
      mode: "service"
      timeout: "0"
      stop_timeout: "30s"
      on_timeout: "kill"
      kill_signal: "SIGTERM"
      concurrency: "replace"

  - name: "docker"
    enabled: true
    runtime: "systemd"
    autostart: true
    actor:
      name: "svc-docker"
      type: "service"
    execution:
      mode: "service"
      timeout: "0"
      stop_timeout: "30s"
      on_timeout: "kill"
      kill_signal: "SIGTERM"
      concurrency: "replace"
  - name: "postgres"
    enabled: false
    runtime: "systemd"
    autostart: false
    actor:
      name: "svc-postgres"
      type: "service"
    execution:
      mode: "service"
      timeout: "0"
      stop_timeout: "45s"
      on_timeout: "kill"
      kill_signal: "SIGTERM"
      concurrency: "replace"

